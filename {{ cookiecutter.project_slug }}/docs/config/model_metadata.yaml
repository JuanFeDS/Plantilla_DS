# Model Metadata
# Siguiendo estándares de MLflow y Model Cards Toolkit
# Este archivo es parseable por código para automatización

model:
  name: "nombre_del_modelo"
  version: "1.0.0"
  type: "classification"  # classification, regression, clustering, ranking
  algorithm: "RandomForest"  # XGBoost, LightGBM, etc.
  framework: "scikit-learn"  # tensorflow, pytorch, etc.
  framework_version: "1.3.0"
  
  # Ubicación del modelo serializado
  artifact_path: "models/model_v1.0.0.pkl"
  
  # Fecha de entrenamiento
  trained_at: "2024-03-15T10:30:00Z"
  trained_by: "nombre_data_scientist"
  
  # Hiperparámetros principales
  hyperparameters:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    random_state: 42

# Datos de entrenamiento
data:
  source: "dwh.clientes.tabla_features"
  size:
    rows: 100000
    features: 25
  date_range:
    start: "2023-01-01"
    end: "2024-01-01"
  
  # Split de datos
  split:
    train: 0.7
    validation: 0.15
    test: 0.15
    strategy: "stratified"  # random, stratified, time_series
  
  # Features principales
  key_features:
    - edad
    - ingreso_mensual
    - score_crediticio
    - antiguedad_meses
    - num_productos

# Métricas de rendimiento
performance:
  # Métricas en conjunto de test
  test_metrics:
    accuracy: 0.89
    precision: 0.85
    recall: 0.82
    f1_score: 0.835
    auc_roc: 0.91
    
  # Métricas por clase (si aplica)
  class_metrics:
    class_0:
      precision: 0.87
      recall: 0.84
      f1_score: 0.855
    class_1:
      precision: 0.83
      recall: 0.80
      f1_score: 0.815
  
  # Métricas de negocio
  business_metrics:
    false_positive_rate: 0.15
    false_negative_rate: 0.18
    estimated_cost_per_fp: 50.0
    estimated_cost_per_fn: 200.0

# Validación
validation:
  method: "k_fold_cross_validation"  # holdout, k_fold, time_series_split
  k_folds: 5
  cv_mean_score: 0.87
  cv_std_score: 0.02

# Dependencias críticas
dependencies:
  python: "3.11"
  packages:
    - name: "scikit-learn"
      version: "1.3.0"
    - name: "pandas"
      version: "2.0.0"
    - name: "numpy"
      version: "1.24.0"

# Consideraciones de producción
production:
  # Latencia esperada
  latency_ms:
    p50: 10
    p95: 25
    p99: 50
  
  # Throughput
  max_requests_per_second: 1000
  
  # Recursos requeridos
  resources:
    cpu_cores: 2
    memory_gb: 4
    gpu_required: false
  
  # Reentrenamiento
  retraining:
    frequency: "monthly"  # daily, weekly, monthly, quarterly
    trigger_conditions:
      - "performance_degradation > 5%"
      - "data_drift_detected"
      - "new_data_available > 10000_rows"

# Limitaciones conocidas
limitations:
  - "No funciona bien con clientes menores de 18 años (fuera de scope)"
  - "Rendimiento degradado cuando ingreso_mensual es NULL"
  - "Sesgo detectado en género: F tiene 3% menos recall que M"
  
# Uso previsto
intended_use:
  primary: "Predecir probabilidad de churn de clientes"
  scenarios:
    - "Campañas de retención proactiva"
    - "Segmentación de clientes de alto riesgo"
  
  not_intended_for:
    - "Decisiones de crédito sin supervisión humana"
    - "Evaluación de empleados"

# Consideraciones éticas
ethical_considerations:
  fairness_evaluation: true
  bias_mitigation: "Rebalanceo de clases por género"
  privacy_compliance: "GDPR compliant"
  explainability: "SHAP values disponibles"

# Contacto
contacts:
  model_owner: "equipo_data_science@empresa.com"
  technical_lead: "nombre_lead@empresa.com"
  business_stakeholder: "nombre_stakeholder@empresa.com"
