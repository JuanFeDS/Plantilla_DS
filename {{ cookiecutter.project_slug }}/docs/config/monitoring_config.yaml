# Monitoring Configuration
# Configuración de observabilidad y monitoreo del modelo en producción

monitoring:
  enabled: true
  environment: "production"
  model_name: "churn_predictor"
  model_version: "1.0.0"

# Métricas de rendimiento del modelo
model_performance:
  # Métricas a trackear
  metrics:
    - name: "accuracy"
      threshold_min: 0.85
      threshold_max: 1.0
      alert_on_breach: true
      
    - name: "precision"
      threshold_min: 0.80
      alert_on_breach: true
      
    - name: "recall"
      threshold_min: 0.78
      alert_on_breach: true
      
    - name: "f1_score"
      threshold_min: 0.80
      alert_on_breach: true
      
    - name: "auc_roc"
      threshold_min: 0.88
      alert_on_breach: true
  
  # Ventana de evaluación
  evaluation_window: "24h"
  evaluation_frequency: "1h"
  
  # Degradación de rendimiento
  performance_degradation:
    enabled: true
    baseline_metrics_path: "models/baseline_metrics.json"
    max_degradation_percentage: 5.0
    alert_severity: "critical"

# Data Drift Detection
data_drift:
  enabled: true
  
  # Métodos de detección
  methods:
    - name: "kolmogorov_smirnov"
      threshold: 0.05
      features: ["edad", "ingreso_mensual", "score_crediticio"]
      
    - name: "population_stability_index"
      threshold: 0.25
      features: ["genero", "num_productos"]
      
    - name: "jensen_shannon_divergence"
      threshold: 0.1
      features: "all"
  
  # Configuración
  reference_dataset_path: "data/reference/train_data.parquet"
  window_size: "7d"
  check_frequency: "daily"
  
  # Alertas
  alert_on_drift: true
  alert_severity: "warning"

# Concept Drift Detection
concept_drift:
  enabled: true
  
  # Detección de cambios en la relación features-target
  methods:
    - name: "adwin"
      window_size: 1000
      
    - name: "page_hinkley"
      threshold: 50
      alpha: 0.9999
  
  check_frequency: "hourly"
  alert_on_drift: true
  alert_severity: "critical"

# Predicciones
predictions:
  # Distribución de predicciones
  distribution_monitoring:
    enabled: true
    
    # Distribución de clases predichas
    class_distribution:
      expected_class_0_percentage: [60, 80]
      expected_class_1_percentage: [20, 40]
      alert_on_deviation: true
    
    # Distribución de confianza
    confidence_distribution:
      min_avg_confidence: 0.70
      max_low_confidence_percentage: 20.0  # % de predicciones con confianza < 0.6
      alert_on_low_confidence: true
  
  # Outliers en predicciones
  outlier_detection:
    enabled: true
    method: "isolation_forest"
    contamination: 0.05
    alert_on_outliers: true

# Latencia y rendimiento del sistema
system_performance:
  # Latencia de predicción
  latency:
    p50_threshold_ms: 10
    p95_threshold_ms: 25
    p99_threshold_ms: 50
    alert_on_breach: true
    
  # Throughput
  throughput:
    min_requests_per_second: 10
    max_requests_per_second: 1000
    alert_on_breach: true
  
  # Tasa de error
  error_rate:
    max_percentage: 1.0
    window: "5m"
    alert_on_breach: true
  
  # Uso de recursos
  resources:
    cpu_usage:
      max_percentage: 80
      alert_on_breach: true
      
    memory_usage:
      max_percentage: 85
      alert_on_breach: true
      
    disk_usage:
      max_percentage: 90
      alert_on_breach: true

# Feature Monitoring
feature_monitoring:
  enabled: true
  
  # Features a monitorear
  features:
    edad:
      type: "numerical"
      expected_range: [18, 99]
      expected_mean: [35, 45]
      expected_std: [10, 15]
      null_threshold_percentage: 0.0
      
    ingreso_mensual:
      type: "numerical"
      expected_range: [0, 1000000]
      null_threshold_percentage: 15.0
      outlier_detection: true
      
    genero:
      type: "categorical"
      expected_categories: ["M", "F", "Otro", "No especificado"]
      null_threshold_percentage: 5.0
      
    score_crediticio:
      type: "numerical"
      expected_range: [300, 850]
      null_threshold_percentage: 20.0
  
  # Frecuencia de checks
  check_frequency: "hourly"

# Feedback Loop
feedback_loop:
  enabled: true
  
  # Recolección de ground truth
  ground_truth_collection:
    enabled: true
    source: "database.feedback_table"
    delay_days: 30  # Tiempo hasta que se conoce el resultado real
    
  # Comparación predicción vs realidad
  prediction_vs_actual:
    enabled: true
    metrics: ["accuracy", "precision", "recall", "f1_score"]
    evaluation_frequency: "weekly"
    
  # Trigger de reentrenamiento
  retraining_triggers:
    - condition: "accuracy_drop > 5%"
      action: "notify_team"
      
    - condition: "data_drift_detected"
      action: "schedule_retraining"
      
    - condition: "new_labeled_data > 10000"
      action: "evaluate_retraining"

# Dashboards
dashboards:
  - name: "Model Performance"
    tool: "grafana"
    url: "https://grafana.empresa.com/d/model-performance"
    panels:
      - "Accuracy over time"
      - "Precision/Recall curves"
      - "Confusion matrix"
      - "ROC curve"
      
  - name: "Data Quality"
    tool: "grafana"
    url: "https://grafana.empresa.com/d/data-quality"
    panels:
      - "Missing values percentage"
      - "Feature distributions"
      - "Data drift scores"
      
  - name: "System Health"
    tool: "grafana"
    url: "https://grafana.empresa.com/d/system-health"
    panels:
      - "Latency percentiles"
      - "Request rate"
      - "Error rate"
      - "CPU/Memory usage"

# Alertas
alerts:
  # Canales de notificación
  channels:
    critical:
      - type: "pagerduty"
        integration_key: "${PAGERDUTY_KEY}"
      - type: "slack"
        webhook: "${SLACK_CRITICAL_WEBHOOK}"
        channel: "#ml-critical-alerts"
        
    warning:
      - type: "slack"
        webhook: "${SLACK_WEBHOOK}"
        channel: "#ml-alerts"
      - type: "email"
        recipients: ["ml-team@empresa.com"]
        
    info:
      - type: "slack"
        webhook: "${SLACK_WEBHOOK}"
        channel: "#ml-monitoring"
  
  # Reglas de escalamiento
  escalation:
    - level: "warning"
      wait_time: "15m"
      escalate_to: "critical"
      
    - level: "critical"
      wait_time: "5m"
      escalate_to: "pagerduty"

# Logging de monitoreo
logging:
  enabled: true
  level: "INFO"
  
  # Qué loggear
  log_events:
    - "prediction_made"
    - "drift_detected"
    - "performance_degradation"
    - "alert_triggered"
    - "threshold_breach"
  
  # Destinos
  destinations:
    - type: "elasticsearch"
      index: "ml-monitoring-logs"
      host: "elasticsearch.empresa.com:9200"
      
    - type: "s3"
      bucket: "ml-monitoring-logs"
      path: "churn-predictor/"

# Reportes automáticos
reports:
  enabled: true
  
  # Reporte diario
  daily:
    enabled: true
    time: "09:00"
    timezone: "UTC"
    recipients: ["ml-team@empresa.com"]
    include:
      - "prediction_volume"
      - "average_confidence"
      - "error_rate"
      - "latency_summary"
      
  # Reporte semanal
  weekly:
    enabled: true
    day: "monday"
    time: "09:00"
    timezone: "UTC"
    recipients: ["ml-team@empresa.com", "stakeholders@empresa.com"]
    include:
      - "model_performance_metrics"
      - "data_drift_analysis"
      - "feature_importance_changes"
      - "business_impact_metrics"
      
  # Reporte mensual
  monthly:
    enabled: true
    day: 1
    time: "09:00"
    timezone: "UTC"
    recipients: ["ml-team@empresa.com", "management@empresa.com"]
    include:
      - "comprehensive_performance_review"
      - "retraining_recommendations"
      - "cost_analysis"
      - "roi_metrics"

# Retención de datos de monitoreo
data_retention:
  predictions: "90d"
  metrics: "365d"
  logs: "30d"
  alerts: "180d"
